<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" fill="none">
  <defs>
    <linearGradient id="chartGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:0"/>
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:0.3"/>
    </linearGradient>
  </defs>
  <!-- Grid lines -->
  <line x1="50" y1="30" x2="380" y2="30" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="50" y1="70" x2="380" y2="70" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="50" y1="110" x2="380" y2="110" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="50" y1="150" x2="380" y2="150" stroke="#e5e7eb" stroke-width="1"/>
  <!-- Area chart - growth -->
  <path d="M70 150 L120 140 L170 100 L220 80 L270 60 L320 45 L370 35 L370 170 L70 170 Z" fill="url(#chartGrad)"/>
  <path d="M70 150 L120 140 L170 100 L220 80 L270 60 L320 45 L370 35" stroke="#4f46e5" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Data points -->
  <circle cx="70" cy="150" r="5" fill="#4f46e5"/>
  <circle cx="120" cy="140" r="5" fill="#4f46e5"/>
  <circle cx="170" cy="100" r="5" fill="#4f46e5"/>
  <circle cx="220" cy="80" r="5" fill="#4f46e5"/>
  <circle cx="270" cy="60" r="5" fill="#4f46e5"/>
  <circle cx="320" cy="45" r="5" fill="#4f46e5"/>
  <circle cx="370" cy="35" r="5" fill="#4f46e5"/>
  <!-- Labels -->
  <text x="50" y="25" fill="#6b7280" font-size="12">100%</text>
  <text x="220" y="190" fill="#6b7280" font-size="12" text-anchor="middle">Months</text>
</svg>
